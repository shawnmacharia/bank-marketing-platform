services:
  # -------------------------------------------------
  # PostgreSQL – holds the data warehouse (schemas
  # bronze/silver/gold/audit) and Airflow metadata
  # -------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    env_file: .env # pulls POSTGRES_* vars
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/sql # <-- NEW: mount local sql folder at /sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # -------------------------------------------------
  # Airflow – LocalExecutor (single-process) for simplicity.
  # -------------------------------------------------
  airflow:
    image: apache/airflow:2.9.0-python3.11
    container_name: airflow
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env # pulls AIRFLOW_* vars
    environment:
      # Airflow core config via env vars
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__WEBSERVER__RBAC: "True"
      AIRFLOW__WEBSERVER__WORKERS: "2"
      AIRFLOW__WEBSERVER__WORKER_CLASS: "sync"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "True"
      # Airflow needs psycopg2 installed; this env var tells the image to pip-install it on start.
      _PIP_ADDITIONAL_REQUIREMENTS: "psycopg2-binary"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/logs:/opt/airflow/logs
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    command:
      - bash
      - -lc
      - |
        airflow db upgrade &&
        airflow users create --username "$AIRFLOW_ADMIN_USERNAME" \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email "$AIRFLOW_ADMIN_EMAIL" \
          --password "$AIRFLOW_ADMIN_PASSWORD" || true &&
        airflow scheduler &
        exec airflow webserver --workers 2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 120s

  pgadmin:
    image: dpage/pgadmin4:7.0
    container_name: pgadmin
    env_file: .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${AIRFLOW_ADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
    depends_on:
      - postgres
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:
